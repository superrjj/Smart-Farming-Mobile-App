# https://supabase.com/docs/guides/cli/config
project_id = "smart-farming-mobile-app"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

# Forgot password runs while logged out; validated in functions via service role.
[functions.send-password-reset]
verify_jwt = false

[functions.verify-password-reset]
verify_jwt = false

[functions.invalidate-password-reset]
verify_jwt = false
